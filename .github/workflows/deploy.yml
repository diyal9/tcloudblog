name: Deploy Hugo Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.146.0'
          extended: true

      - name: Build
        run: hugo --minify
        env:
          TZ: Asia/Shanghai

      - name: Deploy to main/public
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main
          destination_dir: public
          keep_files: false
          commit_message: "docs: deploy site"

      - name: Cleanup old workflow
        run: |
          rm -f .github/workflows/gh-pages.yml 2>/dev/null || true
          rm -f .github/workflows/deploy.yml.bak 2>/dev/null || true
