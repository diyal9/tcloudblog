name: Deploy Hugo Site

on:
  push:
    branches:
      - main
      - hermes

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        run: |
          curl -L "https://github.com/gohugoio/hugo/releases/download/v0.146.0/hugo_extended_0.146.0_linux-amd64.tar.gz" -o hugo.tar.gz
          tar xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: Build
        id: build
        run: |
          hugo --verbose > hugo-build.log 2>&1 || true
          if [ ! -f public/index.html ]; then
            echo "❌ Build failed: public/index.html not found"
            # Post error to GitHub Gist via curl
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/diyal9/tcloudblog/gists \
              -d "{\"description\":\"Hugo Build Error\",\"public\":true,\"files\":{\"error.log\":{\"content\":\"$(cat hugo-build.log | head -100)\"}}}"
            exit 1
          fi
        env:
          TZ: Asia/Shanghai

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hugo-build-log
          path: hugo-build.log

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
