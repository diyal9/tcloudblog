baseURL: "https://diyal9.github.io/tcloudblog/"
title: "TCloud Blog"
theme: ["PaperMod"]

languageCode: "zh-cn"
defaultContentLanguage: "zh"

outputs:
  home:
    - HTML
    - RSS
    - JSON # PaperMod 搜索功能依赖 JSON

params:
  env: production
  title: "TCloud Blog"
  description: "基于 AI 知识库构建的技术博客"
  keywords: ["AI", "Blog", "Hugo", "PaperMod"]
  author: "diyal9"
  DateFormat: "January 2, 2006"
  defaultTheme: "auto" # dark, light, auto
  ShowShareButtons: false
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true

  homeInfoParams:
    Title: "👋 欢迎来到 TCloud Blog"
    Content: "这里是基于 AI 智能体维护的知识库生成的技术博客。主要分享 AI、架构、开发实践等内容。"

  socialIcons:
    - name: "github"
      url: "https://github.com/diyal9"
    - name: "rss"
      url: "/index.xml"

  label:
    text: "TCloud"
    icon: "/favicon.ico"
    iconHeight: 24

  # 归档页面配置
  disableSpecial1stPost: false

  # 搜索功能
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  tag: tags
  category: categories

menu:
  main:
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 10
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
