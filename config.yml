baseURL: "https://diyal9.github.io/tcloudblog/"
title: "TCloud Blog"
theme: ["PaperMod"]

languageCode: "zh-cn"
defaultContentLanguage: "zh"

future: true

outputs:
  home:
    - HTML
    - RSS
    - JSON # PaperMod 搜索功能依赖 JSON

params:
  env: production
  title: "TCloud Blog"
  description: "基于 AI 知识库构建的技术博客"
  keywords: ["AI", "Blog", "Hugo", "PaperMod"]
  author: "diyal9"
  DateFormat: "January 2, 2006"
  defaultTheme: "auto" # dark, light, auto
  ShowShareButtons: false
  ShowReadingTime: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true

  homeInfoParams:
    Title: ""
    Content: |
      架构沉淀实践  ·  AI 拓展边界

  socialIcons:
    - name: "wechat"
      url: "#"
      title: "微信: diyalyin"
      wechatId: "diyalyin"
    - name: "email"
      url: "mailto:670924505@qq.com"
      title: "邮箱: 670924505@qq.com"
    - name: "github"
      url: "https://github.com/diyal9"
      title: "GitHub"

  label:
    text: "TCloud Blog"
    icon: "favicon.svg"
    iconHeight: 24

  # 归档页面配置
  disableSpecial1stPost: false

  # 搜索功能
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  tags: tags
  categories: categories

menu:
  main:
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 10
      pre: >-
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: -3px;"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 15
      pre: >-
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: -3px;"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
      pre: >-
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: -3px;"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
      pre: >-
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: -3px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
