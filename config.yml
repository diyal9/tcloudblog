baseURL: "https://diyal9.github.io/tcloudblog/"
title: "TCloud Blog"
theme: ["PaperMod"]

languageCode: "zh-cn"
defaultContentLanguage: "zh"

future: true

outputs:
  home:
    - HTML
    - RSS
    - JSON # PaperMod 搜索功能依赖 JSON

params:
  env: production
  title: "TCloud Blog"
  description: "基于 AI 知识库构建的技术博客"
  keywords: ["AI", "Blog", "Hugo", "PaperMod"]
  author: "diyal9"
  DateFormat: "January 2, 2006"
  defaultTheme: "auto" # dark, light, auto
  ShowShareButtons: false
  ShowReadingTime: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true

  homeInfoParams:
    Title: ""
    Content: |
      - 所谓成长就是认知升级
      - 技术分享和开发实践
      - 探索AI和实践

  socialIcons:
    - name: "wechat"
      url: "mailto:670924505@qq.com" # Placeholder, user can update to wechat link
      title: "微信: diyalyin"
    - name: "email"
      url: "mailto:670924505@qq.com"
      title: "邮箱: 670924505@qq.com"
    - name: "github"
      url: "https://github.com/diyal9"
      title: "GitHub"

  label:
    text: "TCloud Blog"
    icon: "/favicon.svg"
    iconHeight: 24

  # 归档页面配置
  disableSpecial1stPost: false

  # 搜索功能
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  tags: tags
  categories: categories

menu:
  main:
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 10
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 15
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30
