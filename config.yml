baseURL: "https://diyal9.github.io/tcloudblog/"
title: "TCloud Blog"
theme: ["PaperMod"]

languageCode: "zh-cn"
defaultContentLanguage: "zh"

future: true

outputs:
  home:
    - HTML
    - RSS
    - JSON # PaperMod 搜索功能依赖 JSON

params:
  env: production
  title: "TCloud Blog"
  description: "基于 AI 知识库构建的技术博客"
  keywords: ["AI", "Blog", "Hugo", "PaperMod"]
  author: "diyal9"
  DateFormat: "January 2, 2006"
  defaultTheme: "auto" # dark, light, auto
  ShowShareButtons: false
  ShowReadingTime: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true

  homeInfoParams:
    Title: "欢迎来到 TCloud Blog"
    Content: "分享 AI、架构与开发实践。"

  socialIcons:
    - name: "github"
      url: "https://github.com/diyal9"
    - name: "rss"
      url: "/index.xml"

  label:
    text: "TCloud"
    icon: "/favicon.ico"
    iconHeight: 24

  # 归档页面配置
  disableSpecial1stPost: false

  # 搜索功能
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  tag: tags
  category: categories

menu:
  main:
    - identifier: archives
      name: 📚 归档
      url: /archives/
      weight: 10
    - identifier: tags
      name: 🏷️ 标签
      url: /tags/
      weight: 20
    - identifier: search
      name: 🔍 搜索
      url: /search/
      weight: 30
