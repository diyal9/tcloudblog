baseURL: "https://diyal9.github.io/tcloudblog/"
title: "TCloud Blog"
theme: PaperMod

languageCode: "zh-cn"
disableKinds: ["taxonomy", "term"]

future: true

outputs:
  home:
    - HTML
    - RSS
    - JSON # PaperMod 搜索功能依赖 JSON

params:
  env: production
  mainSections: ["posts"]
  title: "TCloud Blog"
  description: "基于 AI 知识库构建的技术博客"
  keywords: ["AI", "Blog", "Hugo", "PaperMod"]
  author: "diyal9"
  DateFormat: "January 2, 2006"
  defaultTheme: "auto" # dark, light, auto
  ShowShareButtons: false
  ShowReadingTime: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true

  homeInfoParams:
    Title: ""
    Content: |
      架构沉淀实践  ·  AI 拓展边界

  socialIcons:
    - name: "wechat"
      url: "#"
      title: "微信: diyalyin"
      wechatId: "diyalyin"
    - name: "email"
      url: "mailto:670924505@qq.com"
      title: "邮箱: 670924505@qq.com"
    - name: "github"
      url: "https://github.com/diyal9"
      title: "GitHub"

  label:
    text: "TCloud Blog"
    icon: "images/blog-logo.png"
    iconHeight: 54

  # 归档页面配置
  disableSpecial1stPost: false

  # 搜索功能
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  tags: tags
  categories: categories

menu:
  main:
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 10
      pre: "📁"
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
      pre: "📁"
