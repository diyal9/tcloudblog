<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    {{ if .OutputFormats.Get "RSS" }}
    <link rel="alternate" type="application/rss+xml" href="{{ .OutputFormats.Get "RSS" . | relURL }}">
    {{ end }}
</head>
<body>
    <header class="header">
        <nav class="nav-inner">
            <a href="{{ .Site.BaseURL }}" class="nav-brand">{{ .Site.Title }}</a>
            <div class="nav-links">
                <a href="{{ "posts/" | relURL }}">Blog</a>
                <a href="{{ "tags/" | relURL }}">Tags</a>
            </div>
        </nav>
    </header>
    <main class="container">
        {{- block "main" . }}{{- end }}
    </main>
    <footer class="footer">
        <p>&copy; {{ now.Year }} {{ .Site.Params.author }}. Powered by Hugo.</p>
    </footer>
</body>
</html>
