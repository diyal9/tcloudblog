{{ define "main" }}
<article class="post-single">
    <header class="post-header">
        <h1>{{ .Title }}</h1>
        <div class="post-meta">
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
            {{ if .Params.tags }}
            <span class="tags">
                {{ range .Params.tags }}
                <a href="{{ "/tags/" | relURL }}{{ . | urlize }}">#{{ . }}</a>
                {{ end }}
            </span>
            {{ end }}
        </div>
    </header>
    <div class="post-content">
        {{ .Content }}
    </div>
    {{ if .Params.toc }}
    <div class="post-toc">
        <h3>Table of Contents</h3>
        {{ .TableOfContents }}
    </div>
    {{ end }}
</article>
{{ end }}
