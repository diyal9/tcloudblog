{{ define "main" }}
<div class="post-list">
    <h1>{{ .Title }}</h1>
    {{ range .Pages }}
    <article class="post-entry">
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <div class="post-meta">
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
            {{ if .Params.tags }}
            <span class="tags">
                {{ range .Params.tags }}
                <a href="{{ "/tags/" | relURL }}{{ . | urlize }}">{{ . }}</a>
                {{ end }}
            </span>
            {{ end }}
        </div>
        <div class="post-summary">
            {{ .Summary }}
        </div>
    </article>
    {{ end }}
</div>
{{ end }}
